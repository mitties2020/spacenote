services:
  - type: web
    name: clinical-qa
    env: python
    plan: standard
    buildCommand: |
      apt-get update && apt-get install -y --no-install-recommends \
        ffmpeg \
        pkg-config \
        build-essential \
        libavcodec-dev \
        libavdevice-dev \
        libavfilter-dev \
        libavformat-dev \
        libavutil-dev \
        libswresample-dev \
        libswscale-dev \
      && rm -rf /var/lib/apt/lists/*
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180 --access-logfile - --error-logfile -
