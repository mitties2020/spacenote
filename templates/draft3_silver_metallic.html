<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT 3: Silver White Metallic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #e0e0e0;
            overflow: hidden;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) infinite;
        }

        .nebula {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(200, 210, 230, 0.07) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 190, 210, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(200, 200, 220, 0.03) 0%, transparent 60%);
            z-index: -1;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, rgba(15, 15, 25, 0.95) 0%, rgba(8, 8, 18, 0.98) 100%);
            border-right: 1px solid rgba(200, 210, 230, 0.15);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #d0d8e8;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(200, 210, 230, 0.5);
        }

        .sidebar-item {
            padding: 10px;
            background: rgba(200, 210, 230, 0.05);
            border-left: 3px solid transparent;
            border-radius: 2px;
            font-size: 12px;
            color: #b0b8c8;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-item:hover {
            background: rgba(200, 210, 230, 0.12);
            border-left-color: #d0d8e8;
            color: #d0d8e8;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, rgba(15, 15, 25, 0.9) 0%, rgba(20, 20, 35, 0.88) 100%);
            border-bottom: 1px solid rgba(200, 210, 230, 0.2);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #d0d8e8;
            text-shadow: 0 0 12px rgba(200, 210, 230, 0.5);
        }

        .toggle-btn {
            padding: 8px 16px;
            background: rgba(200, 210, 230, 0.1);
            border: 1.5px solid #d0d8e8;
            color: #d0d8e8;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-shadow: 0 0 6px rgba(200, 210, 230, 0.4);
        }

        .toggle-btn:hover {
            background: rgba(200, 210, 230, 0.2);
            box-shadow: 0 0 15px rgba(200, 210, 230, 0.4), inset 0 0 10px rgba(200, 210, 230, 0.1);
        }

        .nav-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(200, 210, 230, 0.15);
        }

        .nav-tabs button {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: #6a7080;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .nav-tabs button:hover { color: #d0d8e8; }
        .nav-tabs button.active {
            color: #d0d8e8;
            border-bottom-color: #d0d8e8;
            text-shadow: 0 0 8px rgba(200, 210, 230, 0.4);
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            gap: 20px;
        }

        .section {
            flex: 1;
        }

        .section-title {
            color: #d0d8e8;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1.2px;
            text-shadow: 0 0 8px rgba(200, 210, 230, 0.4);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #d0d8e8;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(200, 210, 230, 0.3);
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(200, 210, 230, 0.05);
            border: 1px solid rgba(200, 210, 230, 0.2);
            color: #d0d0d0;
            border-radius: 2px;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            transition: all 0.2s;
        }

        select:focus, textarea:focus {
            outline: none;
            background: rgba(200, 210, 230, 0.1);
            border-color: #d0d8e8;
            box-shadow: 0 0 8px rgba(200, 210, 230, 0.25);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .input-format {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .input-format button {
            flex: 1;
            padding: 8px;
            background: rgba(200, 210, 230, 0.05);
            border: 1px solid rgba(200, 210, 230, 0.15);
            color: #b0b8c8;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-format button:hover {
            background: rgba(200, 210, 230, 0.12);
            color: #d0d8e8;
        }

        .input-format button.active {
            background: rgba(200, 210, 230, 0.2);
            color: #d0d8e8;
            border-color: #d0d8e8;
            box-shadow: 0 0 6px rgba(200, 210, 230, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(200, 210, 230, 0.3);
            background: rgba(200, 210, 230, 0.08);
            color: #d0d8e8;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(200, 210, 230, 0.15);
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.3);
        }

        .output-box {
            background: rgba(200, 210, 230, 0.05);
            border: 1px solid rgba(200, 210, 230, 0.2);
            border-radius: 2px;
            padding: 16px;
            min-height: 150px;
            margin-top: 14px;
            color: #b0b8c8;
            font-size: 13px;
            font-family: 'Consolas', monospace;
        }

        .draft-label {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 2px;
            font-size: 10px;
            color: #d0d8e8;
            z-index: 100;
            border: 1px solid rgba(200, 210, 230, 0.3);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-shadow: 0 0 6px rgba(200, 210, 230, 0.4);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(200, 210, 230, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(200, 210, 230, 0.25);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 210, 230, 0.4);
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="nebula"></div>
    
    <div class="draft-label">DRAFT 3: SILVER WHITE METALLIC</div>

    <div class="container">
        <div class="sidebar">
            <h3>⚙ SYSTEM</h3>
            <div class="sidebar-item">No outputs yet</div>
        </div>

        <div class="main">
            <div class="header">
                <h1>VIVIDIMEDI</h1>
                <button class="toggle-btn">STEALTH MODE</button>
            </div>

            <div class="nav-tabs">
                <button class="active">CONSULTATION NOTES</button>
                <button>CLINICAL QUESTIONS</button>
            </div>

            <div class="content">
                <div class="section">
                    <div class="section-title">DATA INPUT</div>
                    <div class="form-group">
                        <label>Report Type</label>
                        <select><option>Consultation Note</option></select>
                    </div>
                    <div class="form-group">
                        <label>Input Format</label>
                        <div class="input-format">
                            <button class="active">TEXT</button>
                            <button>VOICE</button>
                            <button>FILE</button>
                        </div>
                    </div>
                    <textarea placeholder="Enter clinical data here..."></textarea>
                    <div class="btn-group">
                        <button class="btn">CONVERT</button>
                        <button class="btn" style="flex: 0.3;">CLEAR</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">OUTPUT</div>
                    <div class="output-box">Processing...</div>
                    <div class="btn-group">
                        <button class="btn">COPY</button>
                        <button class="btn">DOWNLOAD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 400; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 0.3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--dur', (Math.random() * 4 + 2) + 's');
            container.appendChild(star);
        }
    </script>
</body>
</html>
