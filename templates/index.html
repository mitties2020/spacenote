<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Mode - Clinical Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #2d2d2d;
        }

        .ribbon {
            background: linear-gradient(180deg, #7030a0 0%, #5f259f 100%);
            padding: 0;
            display: flex;
            align-items: center;
            height: 115px;
        }

        .ribbon-top {
            background: #5f259f;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: white;
            border-bottom: 1px solid #522090;
            height: 35px;
            width: 100%;
            position: absolute;
            top: 0;
        }

        .ribbon-top-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ribbon-top-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ribbon-top-right button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .ribbon-top-right button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .ribbon-tabs {
            background: #7030a0;
            padding: 0 12px;
            display: flex;
            gap: 2px;
            align-items: flex-end;
            width: 100%;
            height: 80px;
            margin-top: 35px;
        }

        .ribbon-tab {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ribbon-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .ribbon-tab.active {
            background: white;
            color: #7030a0;
            border-bottom-color: white;
            font-weight: 600;
        }

        .container {
            display: flex;
            height: calc(100vh - 115px);
        }

        .sidebar {
            width: 180px;
            background: #f0f2f5;
            border-right: 1px solid #d0d0d0;
            padding: 12px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            padding: 0 8px;
            margin-bottom: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-section-title {
            font-size: 10px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            padding: 8px 12px;
            letter-spacing: 0.5px;
        }

        .saved-notes-container {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 12px;
            background: #e8eaed;
            border-left: 3px solid transparent;
            border-radius: 2px;
            font-size: 11px;
            color: #333;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            max-height: 80px;
            overflow: hidden;
            word-break: break-word;
            position: relative;
            padding-right: 28px;
        }

        .sidebar-item:hover {
            background: #ddd;
            border-left-color: #7030a0;
        }

        .saved-note-timestamp {
            font-size: 9px;
            color: #666;
            margin-top: 6px;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            color: #999;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
        }

        .sidebar-item:hover .delete-btn {
            display: flex;
            color: #ff6b6b;
        }

        .delete-btn:hover {
            color: #ff5252;
            transform: scale(1.2);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .page-header {
            padding: 16px 32px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 18px;
            color: #000;
            margin-bottom: 0;
            font-weight: 500;
        }

        .page-meta {
            display: none;
        }

        .page-content {
            flex: 1;
            padding: 16px 32px;
            overflow: hidden;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 12px;
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .tab-button {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: #333;
        }

        .tab-button.active {
            color: #7030a0;
            border-bottom-color: #7030a0;
            font-weight: 600;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }

        .tab-content.active {
            display: flex;
        }

        .form-group {
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        select, textarea {
            width: 100%;
            padding: 8px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            color: #333;
            border-radius: 2px;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }

        select {
            background: #f9f9f9;
            color: #333;
            height: auto;
            padding: 6px 8px;
        }

        select option {
            background: #ffffff;
            color: #333;
        }

        select:focus, textarea:focus {
            outline: none;
            background: #fff;
            border-color: #7030a0;
            box-shadow: 0 0 6px rgba(112, 48, 160, 0.15);
        }

        textarea {
            flex: 1;
            resize: none;
            min-height: 0;
            padding: 12px;
        }

        .action-buttons.download-section {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-shrink: 0;
        }

        .column .action-buttons:last-of-type {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .column:hover .action-buttons:last-of-type {
            opacity: 1;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            background: #f5f5f5;
            color: #999;
            font-weight: 500;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #e8e8e8;
            border-color: #ccc;
            color: #666;
        }

        .btn-primary {
            background: #f5f5f5;
            color: #999;
            border-color: #ddd;
        }

        .btn-primary:hover {
            background: #e8e8e8;
            color: #666;
        }

        .output-box {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 2px;
            padding: 16px;
            color: #666;
            font-size: 13px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            margin-bottom: 12px;
        }

        .section-title {
            color: #333;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: #7030a0;
            flex-shrink: 0;
            display: none;
        }

        .two-column {
            display: flex;
            gap: 24px;
            flex: 1;
            min-height: 0;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .stealth-label {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #f5f5f5;
            color: #999;
            padding: 10px 14px;
            border-radius: 3px;
            font-size: 10px;
            z-index: 100;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            border: 1.5px solid #ddd;
            transition: all 0.3s;
        }

        .stealth-label:hover {
            background: #e8e8e8;
            color: #666;
        }

        .stealth-label.active {
            background: #f5f5f5;
            border-color: #ddd;
            color: #999;
        }

        .stealth-label.inactive {
            background: #f5f5f5;
            border-color: #ddd;
            color: #999;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="ribbon">
        <div class="ribbon-top">
            <div class="ribbon-top-left">
                <span>🔙</span>
                <span>↶</span>
                <span>⋯</span>
            </div>
            <div style="flex: 1; text-align: center;">
                <strong style="font-size: 12px;">Untitled page - OneNote</strong>
            </div>
            <div class="ribbon-top-right">
                <button onclick="goBackToMain()">←</button>
                <button>−</button>
                <button>□</button>
                <button>✕</button>
            </div>
        </div>
        <div class="ribbon-tabs">
            <button class="ribbon-tab active">File</button>
            <button class="ribbon-tab">Home</button>
            <button class="ribbon-tab">Insert</button>
            <button class="ribbon-tab">Draw</button>
            <button class="ribbon-tab">History</button>
            <button class="ribbon-tab">Review</button>
            <button class="ribbon-tab">View</button>
            <button class="ribbon-tab">Help</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Saved Notes</div>
                <div class="saved-notes-container" id="notesContainer">
                    <p style="color: #999; font-size: 11px;">No saved notes yet</p>
                </div>
            </div>

            <div class="sidebar-section" style="border-top: 1px solid #d0d0d0; padding-top: 8px; flex: none;">
                <div class="sidebar-section-title">Shared Pages</div>
                <div class="sidebar-item">Quick Notes</div>
            </div>
        </div>

        <div class="main">
            <div class="page-header">
                <div class="page-title">Notes</div>
            </div>

            <div class="page-content">
                <div class="tabs">
                    <button class="tab-button active" onclick="switchTab(event, 'consultation')">Consultation Notes</button>
                    <button class="tab-button" onclick="switchTab(event, 'qa')">Clinical Questions</button>
                </div>

                <!-- Consultation Notes Tab -->
                <div id="consultation" class="tab-content active">
                    <div class="two-column">
                        <div class="column">
                            <div class="form-group">
                                <label>Report Type</label>
                                <select id="reportType" style="font-size: 11px;">
                                    <option>Consultation</option>
                                    <option>SOAP</option>
                                    <option>Discharge</option>
                                    <option>Referral</option>
                                    <option>Progress</option>
                                </select>
                            </div>
                            <textarea id="consultationTextarea" placeholder="Enter notes..."></textarea>
                            <div class="action-buttons">
                                <button class="btn btn-primary" onclick="convertConsultation()">Convert</button>
                                <button class="btn" style="flex: 0.3;" onclick="clearConsultation()">Clear</button>
                            </div>
                        </div>

                        <div class="column">
                            <div class="output-box" id="outputBox">Processing...</div>
                            <div class="action-buttons">
                                <button class="btn" onclick="copyOutput()">Copy</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Clinical Questions Tab -->
                <div id="qa" class="tab-content">
                    <div class="two-column">
                        <div class="column">
                            <div class="form-group">
                                <label>Question Type</label>
                                <select id="questionType" style="font-size: 11px;">
                                    <option>General</option>
                                    <option>Diagnosis</option>
                                    <option>Treatment</option>
                                    <option>Drug Info</option>
                                    <option>Prognosis</option>
                                </select>
                            </div>
                            <textarea id="qaTextarea" placeholder="Enter question..."></textarea>
                            <div class="action-buttons">
                                <button class="btn btn-primary" onclick="answerQuestion()">Get Answer</button>
                                <button class="btn" style="flex: 0.3;" onclick="clearQA()">Clear</button>
                            </div>
                        </div>

                        <div class="column">
                            <div class="output-box" id="qaOutput">Response will appear here...</div>
                            <div class="action-buttons">
                                <button class="btn" onclick="copyQAOutput()">Copy</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="stealth-label active" id="stealthToggle" onclick="toggleStealthMode()">🔒 STEALTH ACTIVE</div>

    <script>
        function goBackToMain() {
            window.location.href = 'vividimedi_final.html';
        }

        function switchTab(e, tabName) {
            const contents = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-button');
            
            contents.forEach(c => c.classList.remove('active'));
            buttons.forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
        }

        function saveNote(content, reportType) {
            const notes = JSON.parse(localStorage.getItem('vividimediNotes') || '[]');
            const timestamp = new Date().toLocaleString('en-AU');
            notes.push({
                content: content,
                reportType: reportType,
                timestamp: timestamp,
                id: Date.now()
            });
            localStorage.setItem('vividimediNotes', JSON.stringify(notes));
            loadSavedNotes();
        }

        function deleteNote(id) {
            const notes = JSON.parse(localStorage.getItem('vividimediNotes') || '[]');
            const filtered = notes.filter(note => note.id !== id);
            localStorage.setItem('vividimediNotes', JSON.stringify(filtered));
            loadSavedNotes();
        }

        function loadSavedNotes() {
            const notes = JSON.parse(localStorage.getItem('vividimediNotes') || '[]');
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = '<p style="color: #999; font-size: 11px;">No saved notes yet</p>';
                return;
            }

            container.innerHTML = notes.map((note) => `
                <div class="sidebar-item">
                    <button class="delete-btn" onclick="deleteNote(${note.id})">×</button>
                    <div>${note.reportType}</div>
                    <div style="margin-top: 6px; font-size: 10px; line-height: 1.3;">${note.content.substring(0, 60)}...</div>
                    <div class="saved-note-timestamp">${note.timestamp}</div>
                </div>
            `).join('');
        }

        function convertConsultation() {
            const input = document.getElementById('consultationTextarea').value;
            const reportType = document.getElementById('reportType').value;
            
            if (!input.trim()) {
                document.getElementById('outputBox').textContent = 'Please enter clinical data';
                return;
            }

            let output = `Generated ${reportType}:\n\n`;
            output += `Input: ${input}\n\n`;
            output += `Template Guidelines:\n- Follow ACEM guidelines\n- Include safety netting\n- Document appropriately`;
            
            document.getElementById('outputBox').textContent = output;
            saveNote(input, reportType);
        }

        function clearConsultation() {
            const input = document.getElementById('consultationTextarea').value;
            if (input.trim()) {
                saveNote(input, document.getElementById('reportType').value);
            }
            document.getElementById('consultationTextarea').value = '';
            document.getElementById('outputBox').textContent = 'Processing...';
        }

        function answerQuestion() {
            const question = document.getElementById('qaTextarea').value;
            const qType = document.getElementById('questionType').value;
            
            if (!question.trim()) {
                document.getElementById('qaOutput').textContent = 'Please enter a question';
                return;
            }

            let response = `Question Type: ${qType}\n\n`;
            response += `Based on Australian ED/Gen Med guidelines:\n`;
            response += `- Consider ACEM standards\n`;
            response += `- Reference Therapeutic Guidelines\n`;
            response += `- Consult NPS MedicineWise where applicable\n\n`;
            response += `Question: ${question}`;

            document.getElementById('qaOutput').textContent = response;
            saveNote(question, 'Q&A: ' + qType);
        }

        function clearQA() {
            const input = document.getElementById('qaTextarea').value;
            if (input.trim()) {
                saveNote(input, 'Q&A: ' + document.getElementById('questionType').value);
            }
            document.getElementById('qaTextarea').value = '';
            document.getElementById('qaOutput').textContent = 'Response will appear here...';
        }

        function copyOutput() {
            navigator.clipboard.writeText(document.getElementById('outputBox').textContent);
        }

        function copyQAOutput() {
            navigator.clipboard.writeText(document.getElementById('qaOutput').textContent);
        }

        document.getElementById('consultationTextarea').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                convertConsultation();
            }
        });

        document.getElementById('qaTextarea').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                answerQuestion();
            }
        });

        let stealthActive = true;

        function toggleStealthMode() {
            stealthActive = !stealthActive;
            const label = document.getElementById('stealthToggle');
            
            if (stealthActive) {
                label.textContent = '🔒 STEALTH ACTIVE';
                label.classList.remove('inactive');
                label.classList.add('active');
            } else {
                label.textContent = '🔓 STEALTH INACTIVE';
                label.classList.remove('active');
                label.classList.add('inactive');
            }
        }

        loadSavedNotes();
    </script>
</body>
</html>
