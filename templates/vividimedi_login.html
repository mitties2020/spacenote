<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VividiMedi - Clinical Notes System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #ffffff;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        body.day-mode {
            background: #1a1a2e;
            color: #ffffff;
        }

        body.login-view {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .login-container {
            text-align: center;
            background: rgba(15, 15, 25, 0.95);
            padding: 40px;
            border-radius: 4px;
            border: 2px solid rgba(200, 210, 230, 0.3);
        }

        .login-container h2 {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 24px;
            text-shadow: 0 0 15px rgba(200, 210, 230, 0.6);
        }

        .login-input {
            padding: 12px;
            margin: 10px 0;
            width: 280px;
            background: rgba(200, 210, 230, 0.06);
            border: 1.5px solid rgba(200, 210, 230, 0.25);
            color: #ffffff;
            border-radius: 2px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .login-input:focus {
            outline: none;
            background: rgba(200, 210, 230, 0.12);
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.3);
        }

        .login-btn {
            padding: 12px 30px;
            margin-top: 20px;
            background: rgba(200, 210, 230, 0.1);
            border: 1.5px solid rgba(200, 210, 230, 0.35);
            color: #ffffff;
            font-weight: 850;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            text-shadow: 0 0 8px rgba(200, 210, 230, 0.4);
        }

        .login-btn:hover {
            background: rgba(200, 210, 230, 0.18);
            box-shadow: 0 0 16px rgba(200, 210, 230, 0.5);
        }

        .login-error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 12px;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) infinite;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .milkyway {
            position: fixed;
            top: 30%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(200, 220, 255, 0.15) 20%,
                rgba(220, 235, 255, 0.25) 50%,
                rgba(200, 220, 255, 0.15) 80%,
                transparent 100%
            );
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .milkyway-detail {
            position: fixed;
            top: 35%;
            left: 0;
            width: 100%;
            height: 30%;
            background: radial-gradient(ellipse at 50% 50%, rgba(255, 255, 220, 0.08) 0%, transparent 70%);
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        .nebula {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(200, 210, 230, 0.1) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 190, 210, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(200, 200, 220, 0.05) 0%, transparent 60%);
            z-index: -1;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        body.day-mode .nebula {
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(200, 210, 230, 0.2) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 190, 210, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(200, 200, 220, 0.1) 0%, transparent 60%);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, rgba(15, 15, 25, 0.95) 0%, rgba(8, 8, 18, 0.98) 100%);
            border-right: 2px solid rgba(200, 210, 230, 0.2);
            padding: 20px;
            overflow-y: auto;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        body.day-mode .sidebar {
            background: linear-gradient(180deg, rgba(25, 25, 45, 0.95) 0%, rgba(15, 15, 35, 0.98) 100%);
        }

        .sidebar h3 {
            color: #ffffff;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 12px rgba(200, 210, 230, 0.7);
        }

        body.day-mode .sidebar h3 {
            color: #ffffff;
            text-shadow: 0 0 14px rgba(200, 210, 230, 0.9);
        }

        .saved-notes-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .saved-note-item {
            padding: 12px;
            background: rgba(200, 210, 230, 0.08);
            border-left: 3px solid rgba(200, 210, 230, 0.4);
            border-radius: 2px;
            font-size: 11px;
            color: #d0d8e8;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            max-height: 80px;
            overflow: hidden;
            word-break: break-word;
        }

        .saved-note-item:hover {
            background: rgba(200, 210, 230, 0.15);
            border-left-color: #ffffff;
            color: #ffffff;
        }

        .saved-note-timestamp {
            font-size: 9px;
            color: #8a92a2;
            margin-top: 6px;
        }

        .logout-btn {
            padding: 10px;
            background: rgba(200, 210, 230, 0.1);
            border: 1.5px solid rgba(200, 210, 230, 0.3);
            color: #ffffff;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(200, 210, 230, 0.2);
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.3);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, rgba(15, 15, 25, 0.92) 0%, rgba(20, 20, 35, 0.90) 100%);
            border-bottom: 2px solid rgba(200, 210, 230, 0.25);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        body.day-mode .header {
            background: linear-gradient(90deg, rgba(25, 25, 45, 0.92) 0%, rgba(30, 30, 55, 0.90) 100%);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(200, 210, 230, 0.05) 50%, transparent 100%);
            pointer-events: none;
            animation: scan-line 8s linear infinite;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 950;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(200, 210, 230, 0.7),
                0 0 40px rgba(200, 210, 230, 0.4);
            position: relative;
            z-index: 2;
        }

        .header-right {
            display: flex;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .toggle-btn {
            padding: 10px 18px;
            background: rgba(200, 210, 230, 0.12);
            border: 1.5px solid #ffffff;
            color: #ffffff;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(200, 210, 230, 0.6);
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.15);
        }

        body.day-mode .toggle-btn {
            border-color: #ffffff;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(200, 210, 230, 0.7);
        }

        .toggle-btn:hover {
            background: rgba(200, 210, 230, 0.22);
            box-shadow: 0 0 20px rgba(200, 210, 230, 0.4), inset 0 0 12px rgba(200, 210, 230, 0.1);
        }

        .nav-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(200, 210, 230, 0.2);
            transition: all 0.4s ease;
        }

        body.day-mode .nav-tabs {
            background: rgba(0, 0, 0, 0.5);
        }

        .nav-tabs button {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            color: #7a8a9a;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .nav-tabs button:hover { 
            color: #ffffff;
            text-shadow: 0 0 10px rgba(200, 210, 230, 0.4);
        }

        body.day-mode .nav-tabs button:hover {
            color: #ffffff;
        }

        .nav-tabs button.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            text-shadow: 0 0 14px rgba(200, 210, 230, 0.7);
            font-weight: 900;
        }

        body.day-mode .nav-tabs button.active {
            color: #ffffff;
            text-shadow: 0 0 16px rgba(200, 210, 230, 0.8);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            gap: 28px;
        }

        .section {
            flex: 1;
        }

        .section-title {
            color: #ffffff;
            font-size: 13px;
            font-weight: 950;
            text-transform: uppercase;
            margin-bottom: 22px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 14px rgba(200, 210, 230, 0.6);
            padding-bottom: 14px;
            border-bottom: 2px solid rgba(200, 210, 230, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        body.day-mode .section-title {
            color: #ffffff;
            text-shadow: 0 0 16px rgba(200, 210, 230, 0.7);
        }

        .section-title::before {
            content: '◆';
            color: #ffffff;
            font-size: 11px;
            text-shadow: 0 0 10px rgba(200, 210, 230, 0.7);
        }

        body.day-mode .section-title::before {
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #ffffff;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1.2px;
            text-shadow: 0 0 10px rgba(200, 210, 230, 0.5);
        }

        body.day-mode .form-group label {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(200, 210, 230, 0.6);
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(200, 210, 230, 0.06);
            border: 1.5px solid rgba(200, 210, 230, 0.25);
            color: #ffffff;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Consolas', monospace;
            transition: all 0.2s;
        }

        body.day-mode select, body.day-mode textarea {
            background: rgba(200, 210, 230, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }

        select:focus, textarea:focus {
            outline: none;
            background: rgba(200, 210, 230, 0.12);
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.3);
        }

        body.day-mode select:focus, body.day-mode textarea:focus {
            background: rgba(200, 210, 230, 0.18);
            border-color: #ffffff;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .input-format {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .input-format button {
            flex: 1;
            padding: 10px;
            background: rgba(200, 210, 230, 0.06);
            border: 1.5px solid rgba(200, 210, 230, 0.18);
            color: #d0d8e8;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        body.day-mode .input-format button {
            color: #e8f0ff;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .input-format button:hover {
            background: rgba(200, 210, 230, 0.14);
            color: #ffffff;
        }

        body.day-mode .input-format button:hover {
            color: #ffffff;
        }

        .input-format button.active {
            background: rgba(200, 210, 230, 0.24);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(200, 210, 230, 0.4);
        }

        body.day-mode .input-format button.active {
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(200, 210, 230, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid rgba(200, 210, 230, 0.35);
            background: rgba(200, 210, 230, 0.1);
            color: #ffffff;
            font-weight: 850;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            text-shadow: 0 0 8px rgba(200, 210, 230, 0.4);
        }

        body.day-mode .btn {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
            text-shadow: 0 0 10px rgba(200, 210, 230, 0.5);
        }

        .btn:hover {
            background: rgba(200, 210, 230, 0.18);
            box-shadow: 0 0 16px rgba(200, 210, 230, 0.5);
        }

        body.day-mode .btn:hover {
            box-shadow: 0 0 18px rgba(200, 210, 230, 0.6);
        }

        .output-box {
            background: rgba(200, 210, 230, 0.07);
            border: 1.5px solid rgba(200, 210, 230, 0.25);
            border-radius: 2px;
            padding: 18px;
            min-height: 160px;
            margin-top: 18px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Consolas', monospace;
        }

        body.day-mode .output-box {
            background: rgba(200, 210, 230, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(200, 210, 230, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(200, 210, 230, 0.35);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 210, 230, 0.6);
        }

        body.day-mode ::-webkit-scrollbar-track {
            background: rgba(200, 210, 230, 0.12);
        }

        body.day-mode ::-webkit-scrollbar-thumb {
            background: rgba(200, 210, 230, 0.5);
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="milkyway"></div>
    <div class="milkyway-detail"></div>
    <div class="nebula"></div>

    <!-- Login Screen -->
    <div id="loginView" class="login-view" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;">
        <div class="login-container">
            <h2>VividiMedi</h2>
            <p style="color: #d0d8e8; margin-bottom: 20px;">Enter Access Code</p>
            <input type="password" id="accessCode" class="login-input" placeholder="Access Code" />
            <button class="login-btn" onclick="authenticate()">LOGIN</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appView" style="display: none; width: 100%; height: 100%;">
        <div class="container">
            <div class="sidebar">
                <h3>📋 SAVED NOTES</h3>
                <div class="saved-notes-container" id="notesContainer">
                    <p style="color: #8a92a2; font-size: 11px;">No saved notes yet</p>
                </div>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>

            <div class="main">
                <div class="header">
                    <h1>VIVIDIMEDI</h1>
                    <div class="header-right">
                        <button class="toggle-btn" id="themeToggle">☀ DAY MODE</button>
                        <button class="toggle-btn" onclick="activateStealth()">🔒 STEALTH MODE</button>
                    </div>
                </div>

                <div class="nav-tabs">
                    <button class="active" onclick="switchTab(event, 'consultation')">CONSULTATION NOTES</button>
                    <button onclick="switchTab(event, 'qa')">CLINICAL QUESTIONS</button>
                </div>

                <div class="content">
                    <!-- Consultation Notes Tab -->
                    <div id="consultation" style="display: flex; gap: 28px; width: 100%;">
                        <div class="section">
                            <div class="section-title">DATA INPUT</div>
                            <div class="form-group">
                                <label>Report Type</label>
                                <select id="reportType">
                                    <option>Consultation Note</option>
                                    <option>SOAP Note</option>
                                    <option>Discharge Summary</option>
                                    <option>Referral Letter</option>
                                    <option>Progress Note</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Input Format</label>
                                <div class="input-format">
                                    <button class="active">TEXT</button>
                                    <button>VOICE</button>
                                    <button>FILE</button>
                                </div>
                            </div>
                            <textarea id="inputTextarea" placeholder="Enter clinical data here... (Press Enter to convert)"></textarea>
                            <div class="btn-group">
                                <button class="btn" id="convertBtn" onclick="convertNotes()">CONVERT</button>
                                <button class="btn" style="flex: 0.3;">CLEAR</button>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">OUTPUT</div>
                            <div class="output-box" id="outputBox">Enter clinical data to process...</div>
                            <div class="btn-group">
                                <button class="btn">COPY</button>
                                <button class="btn">DOWNLOAD</button>
                            </div>
                        </div>
                    </div>

                    <!-- Clinical Questions Tab -->
                    <div id="qa" style="display: none; gap: 28px; width: 100%;">
                        <div class="section">
                            <div class="section-title">QUESTION</div>
                            <div class="form-group">
                                <label>Question Type</label>
                                <select id="questionType">
                                    <option>General Clinical</option>
                                    <option>Diagnosis</option>
                                    <option>Treatment Options</option>
                                    <option>Drug Interaction</option>
                                    <option>Prognosis</option>
                                    <option>Side Effects</option>
                                </select>
                            </div>
                            <textarea id="qaTextarea" placeholder="Enter your clinical question... (Press Enter to submit)"></textarea>
                            <div class="btn-group">
                                <button class="btn" id="qaBtn" onclick="askQuestion()">GET ANSWER</button>
                                <button class="btn" style="flex: 0.3;">CLEAR</button>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">RESPONSE</div>
                            <div class="output-box" id="qaOutput">Enter a question to get AI response based on Australian ED/Gen Med guidelines...</div>
                            <div class="btn-group">
                                <button class="btn">COPY</button>
                                <button class="btn">DOWNLOAD</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 800; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 0.2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--dur', (Math.random() * 4 + 2) + 's');
            star.style.opacity = Math.random() * 0.8 + 0.3;
            container.appendChild(star);
        }

        function authenticate() {
            const code = document.getElementById('accessCode').value;
            if (code === '931986') {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('appView').style.display = 'block';
                setupEventListeners();
            } else {
                document.getElementById('loginError').textContent = 'Invalid access code';
            }
        }

        function logout() {
            document.getElementById('loginView').style.display = 'flex';
            document.getElementById('appView').style.display = 'none';
            document.getElementById('accessCode').value = '';
            document.getElementById('loginError').textContent = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('accessCode').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') authenticate();
            });
        });

        function switchTab(e, tabName) {
            document.querySelectorAll('.content > div').forEach(el => el.style.display = 'none');
            document.getElementById(tabName).style.display = 'flex';
            
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
        }

        function setupEventListeners() {
            document.getElementById('inputTextarea').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    convertNotes();
                }
            });

            document.getElementById('qaTextarea').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    askQuestion();
                }
            });

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('day-mode');
                document.getElementById('themeToggle').textContent = document.body.classList.contains('day-mode') ? '🌙 NIGHT MODE' : '☀ DAY MODE';
            });
        }

        function activateStealth() {
            sessionStorage.setItem('stealthMode', 'true');
            window.location.href = 'stealth_clinical_interface.html';
        }

        function convertNotes() {
            const input = document.getElementById('inputTextarea').value;
            if (input.trim()) {
                document.getElementById('outputBox').textContent = 'Processed: ' + input.substring(0, 100) + '...';
            }
        }

        function askQuestion() {
            const question = document.getElementById('qaTextarea').value;
            if (question.trim()) {
                document.getElementById('qaOutput').textContent = 'Answer based on Australian ED/Gen Med guidelines for: ' + question.substring(0, 100) + '...';
            }
        }
